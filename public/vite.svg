
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#c9184a"/>
    </linearGradient>

    <radialGradient id="auraGradient">
      <stop offset="0%" stop-color="#ff758f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff758f" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Expanding Aura -->
  <circle cx="100" cy="100" r="40" fill="url(#auraGradient)">
    <animate attributeName="r" values="40;90" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <circle cx="100" cy="100" r="40" fill="url(#auraGradient)">
    <animate attributeName="r" values="40;100" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Heart -->
  <g filter="url(#glow)">
    <path fill="url(#heartGradient)" d="
      M100 150
      L85 135
      C45 100 25 75 25 50
      C25 30 40 15 60 15
      C75 15 90 28 100 45
      C110 28 125 15 140 15
      C160 15 175 30 175 50
      C175 75 155 100 115 135
      Z">
      <animateTransform
        attributeName="transform"
        type="scale"
        values="1;1.18;1"
        dur="0.9s"
        repeatCount="indefinite"
        additive="sum"
        origin="100 100"/>
    </path>
  </g>
</svg>
